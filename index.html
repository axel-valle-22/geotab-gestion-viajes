<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gestión de Viajes</title>
</head>
<body>
<div id="gv-app">
<div id="gv-style-container"></div>
<div id="gv-header">
  <h1>🚛 Gestión de Viajes</h1>
  <p>DoloresParra S.A. — Panel de Coordinación</p>
</div>
<div id="gv-tabs">
  <button class="gv-tab-btn gv-active" data-tab="panel">📊 Panel</button>
  <button class="gv-tab-btn" data-tab="nuevo">➕ Nuevo Viaje</button>
  <button class="gv-tab-btn" data-tab="alertas">🔔 Alertas <span id="gv-alert-badge" class="gv-badge" style="display:none">0</span></button>
</div>
<div id="gv-tab-panel" class="gv-tab-content gv-show">
  <div id="gv-stats" class="gv-stats-grid">
    <div class="gv-stat-card"><div class="gv-stat-num" id="stat-hoy">0</div><div class="gv-stat-lbl">Hoy</div></div>
    <div class="gv-stat-card"><div class="gv-stat-num gv-blue" id="stat-curso">0</div><div class="gv-stat-lbl">En Curso</div></div>
    <div class="gv-stat-card"><div class="gv-stat-num gv-green" id="stat-comp">0</div><div class="gv-stat-lbl">Completados</div></div>
    <div class="gv-stat-card"><div class="gv-stat-num gv-red" id="stat-dem">0</div><div class="gv-stat-lbl">Demorados</div></div>
  </div>
  <div id="gv-loading" style="text-align:center;padding:40px;color:#666">⏳ Cargando datos...</div>
  <div id="gv-trip-list"></div>
</div>
<div id="gv-tab-nuevo" class="gv-tab-content">
  <div class="gv-form-card">
    <h2>Nuevo Viaje</h2>
    <div class="gv-form-row">
      <label>Conductor</label>
      <select id="gv-conductor"><option value="">Cargando...</option></select>
    </div>
    <div class="gv-form-row">
      <label>Unidad / Vehículo</label>
      <select id="gv-vehiculo"><option value="">Cargando...</option></select>
    </div>
    <div class="gv-form-row gv-two-col">
      <div>
        <label>Fecha</label>
        <input type="date" id="gv-fecha">
      </div>
      <div>
        <label>Hora de Salida</label>
        <input type="time" id="gv-hora">
      </div>
    </div>
    <div class="gv-form-row">
      <label>Origen</label>
      <input type="text" id="gv-origen" placeholder="Ej: Base Allen">
    </div>
    <div class="gv-form-row">
      <label>Puntos de Carga/Descarga</label>
      <div id="gv-stops-container">
        <div id="gv-stops-list"></div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <select id="gv-stop-select" style="flex:1"><option value="">Seleccionar zona...</option></select>
          <button id="gv-btn-add-stop" class="gv-btn gv-btn-sm">+ Agregar</button>
        </div>
      </div>
    </div>
    <div class="gv-form-row">
      <label>Destino</label>
      <input type="text" id="gv-destino" placeholder="Ej: Base Plottier">
    </div>
    <div class="gv-form-row">
      <label>Observaciones</label>
      <textarea id="gv-obs" rows="3" placeholder="Instrucciones adicionales para el chofer..."></textarea>
    </div>
    <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:20px">
      <button id="gv-btn-cancelar" class="gv-btn gv-btn-sec">Cancelar</button>
      <button id="gv-btn-guardar" class="gv-btn gv-btn-primary">💾 Guardar Viaje</button>
    </div>
    <div id="gv-form-msg" style="margin-top:12px;padding:10px;border-radius:6px;display:none"></div>
  </div>
</div>
<div id="gv-tab-alertas" class="gv-tab-content">
  <div id="gv-alertas-list">
    <p style="text-align:center;color:#666;padding:40px">Sin alertas activas</p>
  </div>
</div>
</div>

<script>
(function() {
  'use strict';

  // ========== STATE ==========
  var state = {
    conductores: [],
    vehiculos: [],
    zonas: [],
    viajes: [],
    alertas: [],
    api: null,
    refreshTimer: null
  };

  // ========== CSS ==========
  var css = `
    #gv-app { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; max-width:900px; margin:0 auto; padding:16px; color:#222; }
    #gv-header { background:linear-gradient(135deg,#1a56db,#7e3af2); color:#fff; padding:20px 24px; border-radius:12px; margin-bottom:16px; }
    #gv-header h1 { margin:0 0 4px; font-size:1.6rem; }
    #gv-header p { margin:0; opacity:.85; font-size:.9rem; }
    #gv-tabs { display:flex; gap:4px; margin-bottom:16px; border-bottom:2px solid #e5e7eb; padding-bottom:4px; }
    .gv-tab-btn { background:none; border:none; padding:10px 18px; cursor:pointer; font-size:.95rem; color:#6b7280; border-radius:8px 8px 0 0; transition:all .2s; }
    .gv-tab-btn:hover { background:#f3f4f6; color:#374151; }
    .gv-tab-btn.gv-active { background:#1a56db; color:#fff; }
    .gv-tab-content { display:none; }
    .gv-tab-content.gv-show { display:block; }
    .gv-badge { background:#ef4444; color:#fff; border-radius:10px; padding:1px 6px; font-size:.75rem; margin-left:4px; }
    .gv-stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
    .gv-stat-card { background:#fff; border:1px solid #e5e7eb; border-radius:10px; padding:16px; text-align:center; box-shadow:0 1px 3px rgba(0,0,0,.05); }
    .gv-stat-num { font-size:2rem; font-weight:700; color:#1a56db; }
    .gv-stat-num.gv-blue { color:#0891b2; }
    .gv-stat-num.gv-green { color:#059669; }
    .gv-stat-num.gv-red { color:#dc2626; }
    .gv-stat-lbl { font-size:.8rem; color:#6b7280; margin-top:4px; }
    .gv-trip-card { background:#fff; border:1px solid #e5e7eb; border-radius:10px; padding:16px; margin-bottom:12px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
    .gv-trip-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
    .gv-trip-title { font-weight:600; font-size:1rem; }
    .gv-status { padding:4px 10px; border-radius:20px; font-size:.78rem; font-weight:600; }
    .gv-s-planificado { background:#dbeafe; color:#1e40af; }
    .gv-s-en_curso { background:#d1fae5; color:#065f46; }
    .gv-s-completado { background:#f3f4f6; color:#6b7280; }
    .gv-s-demorado { background:#fee2e2; color:#991b1b; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
    .gv-trip-info { font-size:.85rem; color:#6b7280; margin-bottom:8px; }
    .gv-stops { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
    .gv-stop-chip { background:#f3f4f6; border:1px solid #d1d5db; border-radius:6px; padding:3px 8px; font-size:.78rem; color:#374151; }
    .gv-trip-actions { display:flex; gap:8px; margin-top:12px; justify-content:flex-end; }
    .gv-btn { padding:8px 16px; border:none; border-radius:8px; cursor:pointer; font-size:.88rem; font-weight:500; transition:all .2s; }
    .gv-btn-sm { padding:6px 12px; font-size:.82rem; }
    .gv-btn-primary { background:#1a56db; color:#fff; }
    .gv-btn-primary:hover { background:#1648c0; }
    .gv-btn-sec { background:#f3f4f6; color:#374151; }
    .gv-btn-sec:hover { background:#e5e7eb; }
    .gv-btn-suc { background:#059669; color:#fff; }
    .gv-btn-suc:hover { background:#047857; }
    .gv-btn-warn { background:#d97706; color:#fff; }
    .gv-btn-warn:hover { background:#b45309; }
    .gv-form-card { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:24px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
    .gv-form-card h2 { margin:0 0 20px; font-size:1.2rem; color:#1a56db; }
    .gv-form-row { margin-bottom:14px; }
    .gv-form-row label { display:block; font-size:.85rem; font-weight:600; color:#374151; margin-bottom:5px; }
    .gv-form-row input, .gv-form-row select, .gv-form-row textarea { width:100%; padding:9px 12px; border:1px solid #d1d5db; border-radius:8px; font-size:.9rem; color:#111; box-sizing:border-box; }
    .gv-form-row input:focus, .gv-form-row select:focus, .gv-form-row textarea:focus { outline:none; border-color:#1a56db; box-shadow:0 0 0 3px rgba(26,86,219,.15); }
    .gv-two-col { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .gv-alert-card { background:#fff; border-left:4px solid #ef4444; border-radius:8px; padding:14px 16px; margin-bottom:10px; box-shadow:0 1px 3px rgba(0,0,0,.05); display:flex; justify-content:space-between; align-items:center; }
    .gv-alert-text { font-size:.9rem; }
    .gv-alert-time { font-size:.78rem; color:#6b7280; margin-top:3px; }
    .gv-stop-item { display:flex; align-items:center; gap:8px; padding:6px 10px; background:#f9fafb; border:1px solid #e5e7eb; border-radius:6px; margin-bottom:6px; }
    .gv-stop-item span { flex:1; font-size:.85rem; }
    .gv-stop-item button { background:none; border:none; cursor:pointer; color:#ef4444; font-size:1rem; padding:0 4px; }
  `;

  // ========== HELPERS ==========
  function injectCSS() {
    var el = document.getElementById('gv-style-container');
    if (el) {
      var styleEl = document.createElement('style');
      styleEl.textContent = css;
      el.appendChild(styleEl);
    }
  }

  function showTab(tabName) {
    document.querySelectorAll('.gv-tab-btn').forEach(function(btn) {
      btn.classList.toggle('gv-active', btn.getAttribute('data-tab') === tabName);
    });
    document.querySelectorAll('.gv-tab-content').forEach(function(el) {
      el.classList.remove('gv-show');
    });
    var target = document.getElementById('gv-tab-' + tabName);
    if (target) target.classList.add('gv-show');
  }

  function statusLabel(s) {
    var map = { planificado: 'Planificado', en_curso: 'En Curso', completado: 'Completado', demorado: 'Demorado' };
    return map[s] || s;
  }

  function formatDate(d) {
    if (!d) return '';
    var dt = d instanceof Date ? d : new Date(d);
    return dt.toLocaleDateString('es-AR') + ' ' + dt.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
  }

  function setStats() {
    var hoy = 0, curso = 0, comp = 0, dem = 0;
    var today = new Date().toDateString();
    state.viajes.forEach(function(v) {
      var d = new Date(v.fechaSalida);
      if (d.toDateString() === today) hoy++;
      if (v.estado === 'en_curso') curso++;
      if (v.estado === 'completado') comp++;
      if (v.estado === 'demorado') dem++;
    });
    document.getElementById('stat-hoy').textContent = hoy;
    document.getElementById('stat-curso').textContent = curso;
    document.getElementById('stat-comp').textContent = comp;
    document.getElementById('stat-dem').textContent = dem;
  }

  function renderTrips() {
    var list = document.getElementById('gv-trip-list');
    if (!list) return;
    if (state.viajes.length === 0) {
      list.innerHTML = '<p style="text-align:center;color:#6b7280;padding:40px">No hay viajes registrados. Crea el primero usando "+ Nuevo Viaje".</p>';
      return;
    }
    var sorted = state.viajes.slice().sort(function(a, b) { return new Date(b.fechaSalida) - new Date(a.fechaSalida); });
    list.innerHTML = sorted.map(function(v) {
      var stopsHtml = (v.paradas || []).map(function(p) {
        return '<span class="gv-stop-chip">📍 ' + (p.nombre || p) + '</span>';
      }).join('');
      var actions = '';
      if (v.estado === 'planificado') {
        actions = '<button class="gv-btn gv-btn-suc gv-btn-sm" data-action="iniciar" data-id="' + v.id + '">▶ Iniciar</button>' +
                  '<button class="gv-btn gv-btn-sec gv-btn-sm" data-action="cancelar" data-id="' + v.id + '">Cancelar</button>';
      } else if (v.estado === 'en_curso' || v.estado === 'demorado') {
        actions = '<button class="gv-btn gv-btn-primary gv-btn-sm" data-action="completar" data-id="' + v.id + '">✓ Completar</button>';
      }
      return '<div class="gv-trip-card">' +
        '<div class="gv-trip-header">' +
          '<div class="gv-trip-title">🚛 ' + (v.conductor || 'Sin conductor') + ' — ' + (v.vehiculo || 'Sin unidad') + '</div>' +
          '<span class="gv-status gv-s-' + (v.estado || 'planificado') + '">' + statusLabel(v.estado || 'planificado') + '</span>' +
        '</div>' +
        '<div class="gv-trip-info">📅 ' + formatDate(v.fechaSalida) + ' &nbsp;|&nbsp; 📍 ' + (v.origen || '') + ' → ' + (v.destino || '') + '</div>' +
        (stopsHtml ? '<div class="gv-stops">' + stopsHtml + '</div>' : '') +
        (v.observaciones ? '<div style="font-size:.82rem;color:#6b7280;margin-top:6px;font-style:italic">' + v.observaciones + '</div>' : '') +
        '<div class="gv-trip-actions">' + actions + '</div>' +
      '</div>';
    }).join('');
  }

  function renderAlertas() {
    var list = document.getElementById('gv-alertas-list');
    if (!list) return;
    if (state.alertas.length === 0) {
      list.innerHTML = '<p style="text-align:center;color:#6b7280;padding:40px">✅ Sin alertas activas</p>';
      document.getElementById('gv-alert-badge').style.display = 'none';
      return;
    }
    document.getElementById('gv-alert-badge').style.display = 'inline';
    document.getElementById('gv-alert-badge').textContent = state.alertas.length;
    list.innerHTML = state.alertas.map(function(a) {
      return '<div class="gv-alert-card">' +
        '<div>' +
          '<div class="gv-alert-text">⚠️ ' + a.mensaje + '</div>' +
          '<div class="gv-alert-time">' + formatDate(a.fecha) + '</div>' +
        '</div>' +
        '<button class="gv-btn gv-btn-sec gv-btn-sm" data-action="dismiss-alert" data-id="' + a.id + '">Descartar</button>' +
      '</div>';
    }).join('');
  }

  function checkAlertas() {
    var now = new Date();
    var DELAY_MS = 30 * 60 * 1000;
    state.viajes.forEach(function(v) {
      if (v.estado === 'planificado') {
        var salida = new Date(v.fechaSalida);
        if (now - salida > DELAY_MS) {
          v.estado = 'demorado';
          var aid = 'a_' + v.id + '_salida';
          if (!state.alertas.find(function(a) { return a.id === aid; })) {
            state.alertas.push({ id: aid, mensaje: 'El viaje de ' + v.conductor + ' no salió a tiempo (Origen: ' + v.origen + ')', fecha: new Date(), viajeId: v.id });
          }
        }
      }
    });
  }

  function loadFromApi() {
    if (!state.api) return;
    var loading = document.getElementById('gv-loading');
    if (loading) loading.style.display = 'block';

    var p1 = new Promise(function(resolve) {
      state.api.call('Get', { typeName: 'User', search: { isDriver: true } }, function(res) {
        state.conductores = (res || []).map(function(u) { return { id: u.id, nombre: (u.firstName || '') + ' ' + (u.lastName || '') }; });
        var sel = document.getElementById('gv-conductor');
        if (sel) {
          sel.innerHTML = '<option value="">Seleccionar conductor...</option>' +
            state.conductores.map(function(c) { return '<option value="' + c.id + '">' + c.nombre.trim() + '</option>'; }).join('');
        }
        resolve();
      }, function(err) { console.error('Error loading drivers:', err); resolve(); });
    });

    var p2 = new Promise(function(resolve) {
      state.api.call('Get', { typeName: 'Device', search: {} }, function(res) {
        state.vehiculos = (res || []).map(function(d) { return { id: d.id, nombre: d.name || d.id }; });
        var sel = document.getElementById('gv-vehiculo');
        if (sel) {
          sel.innerHTML = '<option value="">Seleccionar vehículo...</option>' +
            state.vehiculos.map(function(d) { return '<option value="' + d.id + '">' + d.nombre + '</option>'; }).join('');
        }
        resolve();
      }, function(err) { console.error('Error loading devices:', err); resolve(); });
    });

    var p3 = new Promise(function(resolve) {
      state.api.call('Get', { typeName: 'Zone', search: {} }, function(res) {
        state.zonas = (res || []).map(function(z) { return { id: z.id, nombre: z.name || z.id }; });
        var sel = document.getElementById('gv-stop-select');
        if (sel) {
          sel.innerHTML = '<option value="">Seleccionar zona...</option>' +
            state.zonas.map(function(z) { return '<option value="' + z.id + '">' + z.nombre + '</option>'; }).join('');
        }
        resolve();
      }, function(err) { console.error('Error loading zones:', err); resolve(); });
    });

    var p4 = new Promise(function(resolve) {
      state.api.call('Get', { typeName: 'AddInData', search: { addInId: 'GestionViajesDP_v1' } }, function(res) {
        if (res && res.length > 0 && res[0].details) {
          try {
            var data = JSON.parse(res[0].details);
            state.viajes = data.viajes || [];
            state.alertas = data.alertas || [];
            state._addInDataId = res[0].id;
          } catch(e) { state.viajes = []; state.alertas = []; }
        }
        resolve();
      }, function() { state.viajes = []; state.alertas = []; resolve(); });
    });

    Promise.all([p1, p2, p3, p4]).then(function() {
      if (loading) loading.style.display = 'none';
      checkAlertas();
      setStats();
      renderTrips();
      renderAlertas();
    });
  }

  function saveData() {
    if (!state.api) return Promise.resolve();
    var details = JSON.stringify({ viajes: state.viajes, alertas: state.alertas });
    return new Promise(function(resolve) {
      if (state._addInDataId) {
        state.api.call('Set', { typeName: 'AddInData', entity: { id: state._addInDataId, addInId: 'GestionViajesDP_v1', details: details } }, resolve, resolve);
      } else {
        state.api.call('Add', { typeName: 'AddInData', entity: { addInId: 'GestionViajesDP_v1', details: details } }, function(id) {
          state._addInDataId = id;
          resolve();
        }, resolve);
      }
    });
  }

  function generateId() {
    return 'v_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
  }

  // ========== EVENT HANDLERS ==========
  function setupEvents() {
    // Tab switching
    document.querySelectorAll('.gv-tab-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        showTab(btn.getAttribute('data-tab'));
      });
    });

    // Add stop
    var btnAddStop = document.getElementById('gv-btn-add-stop');
    if (btnAddStop) {
      btnAddStop.addEventListener('click', function() {
        var sel = document.getElementById('gv-stop-select');
        if (!sel || !sel.value) return;
        var nombre = sel.options[sel.selectedIndex].text;
        var id = sel.value;
        var stopsList = document.getElementById('gv-stops-list');
        var item = document.createElement('div');
        item.className = 'gv-stop-item';
        item.setAttribute('data-stop-id', id);
        item.innerHTML = '<span>📍 ' + nombre + '</span><button data-remove="stop" title="Quitar">✕</button>';
        item.querySelector('[data-remove]').addEventListener('click', function() { item.remove(); });
        stopsList.appendChild(item);
        sel.value = '';
      });
    }

    // Cancelar form
    var btnCancelar = document.getElementById('gv-btn-cancelar');
    if (btnCancelar) {
      btnCancelar.addEventListener('click', function() { showTab('panel'); });
    }

    // Guardar viaje
    var btnGuardar = document.getElementById('gv-btn-guardar');
    if (btnGuardar) {
      btnGuardar.addEventListener('click', function() {
        var conductorSel = document.getElementById('gv-conductor');
        var vehiculoSel = document.getElementById('gv-vehiculo');
        var fechaEl = document.getElementById('gv-fecha');
        var horaEl = document.getElementById('gv-hora');
        var origenEl = document.getElementById('gv-origen');
        var destinoEl = document.getElementById('gv-destino');
        var obsEl = document.getElementById('gv-obs');
        var msg = document.getElementById('gv-form-msg');

        if (!conductorSel.value || !vehiculoSel.value || !fechaEl.value || !horaEl.value || !origenEl.value || !destinoEl.value) {
          msg.style.display = 'block';
          msg.style.background = '#fee2e2';
          msg.style.color = '#991b1b';
          msg.textContent = '⚠️ Completa todos los campos obligatorios.';
          return;
        }

        var paradas = [];
        document.querySelectorAll('#gv-stops-list .gv-stop-item').forEach(function(el) {
          paradas.push({ id: el.getAttribute('data-stop-id'), nombre: el.querySelector('span').textContent.replace('📍 ', '') });
        });

        var conductorNombre = conductorSel.options[conductorSel.selectedIndex].text;
        var vehiculoNombre = vehiculoSel.options[vehiculoSel.selectedIndex].text;

        var viaje = {
          id: generateId(),
          conductorId: conductorSel.value,
          conductor: conductorNombre,
          vehiculoId: vehiculoSel.value,
          vehiculo: vehiculoNombre,
          fechaSalida: fechaEl.value + 'T' + horaEl.value + ':00',
          origen: origenEl.value,
          destino: destinoEl.value,
          paradas: paradas,
          observaciones: obsEl ? obsEl.value : '',
          estado: 'planificado',
          creadoEn: new Date().toISOString()
        };

        state.viajes.push(viaje);
        msg.style.display = 'block';
        msg.style.background = '#d1fae5';
        msg.style.color = '#065f46';
        msg.textContent = '✅ Guardando viaje...';
        btnGuardar.disabled = true;

        saveData().then(function() {
          msg.textContent = '✅ ¡Viaje guardado correctamente!';
          // Reset form
          conductorSel.value = '';
          vehiculoSel.value = '';
          fechaEl.value = '';
          horaEl.value = '';
          origenEl.value = '';
          destinoEl.value = '';
          if (obsEl) obsEl.value = '';
          document.getElementById('gv-stops-list').innerHTML = '';
          btnGuardar.disabled = false;
          setStats();
          renderTrips();
          setTimeout(function() { showTab('panel'); }, 1500);
        });
      });
    }

    // Trip actions (iniciar, completar, cancelar) — event delegation on trip list
    var tripList = document.getElementById('gv-trip-list');
    if (tripList) {
      tripList.addEventListener('click', function(e) {
        var btn = e.target.closest('[data-action]');
        if (!btn) return;
        var action = btn.getAttribute('data-action');
        var id = btn.getAttribute('data-id');
        var viaje = state.viajes.find(function(v) { return v.id === id; });
        if (!viaje) return;
        if (action === 'iniciar') {
          viaje.estado = 'en_curso';
          viaje.iniciadoEn = new Date().toISOString();
        } else if (action === 'completar') {
          viaje.estado = 'completado';
          viaje.completadoEn = new Date().toISOString();
        } else if (action === 'cancelar') {
          viaje.estado = 'cancelado';
          state.viajes = state.viajes.filter(function(v) { return v.id !== id; });
        }
        saveData().then(function() {
          setStats();
          renderTrips();
        });
      });
    }

    // Alertas dismiss — event delegation
    var alertList = document.getElementById('gv-alertas-list');
    if (alertList) {
      alertList.addEventListener('click', function(e) {
        var btn = e.target.closest('[data-action="dismiss-alert"]');
        if (!btn) return;
        var id = btn.getAttribute('data-id');
        state.alertas = state.alertas.filter(function(a) { return a.id !== id; });
        saveData().then(renderAlertas);
      });
    }
  }

  // ========== INIT ==========
  function initialize(api, appState) {
    state.api = api;
    injectCSS();
    setupEvents();

    // Set default date/time
    var now = new Date();
    var fechaEl = document.getElementById('gv-fecha');
    var horaEl = document.getElementById('gv-hora');
    if (fechaEl) fechaEl.value = now.toISOString().substring(0, 10);
    if (horaEl) horaEl.value = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

    loadFromApi();

    // Auto-refresh every 60 seconds
    state.refreshTimer = setInterval(function() {
      loadFromApi();
    }, 60000);
  }

  // Expose to Geotab add-in runner
  if (typeof window !== 'undefined') {
    window.initialize = initialize;
  }
})();
</script>
</body>
  </html>
