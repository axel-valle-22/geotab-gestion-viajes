<!-- redeploy trigger -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gestion de Viajes</title>
</head>
<body>
<div id="gv-app">
<div id="gv-style-container"></div>
<div id="gv-header"><img src="https://axel-valle-22.github.io/geotab-gestion-viajes/logo-tdp.png" alt="Transportes Dolores Parra" style="height:48px;margin-bottom:8px;display:block">
<h1>Gestion de Viajes</h1>
<p>DoloresParra S.A. - Panel de Coordinacion</p>
</div>
<div id="gv-tabs">
<button class="gv-tab-btn gv-active" data-tab="panel">Panel</button>
<button class="gv-tab-btn" data-tab="nuevo">Nuevo Viaje</button>
<button class="gv-tab-btn" data-tab="seguimiento">Seguimiento</button>
<button class="gv-tab-btn" data-tab="alertas">Alertas <span id="gv-alert-badge" class="gv-badge" style="display:none">0</span></button>
</div>

<div id="gv-tab-panel" class="gv-tab-content gv-show">
<div class="gv-stats-grid">
<div class="gv-stat-card"><div class="gv-stat-num" id="stat-hoy">0</div><div class="gv-stat-lbl">Hoy</div></div>
<div class="gv-stat-card"><div class="gv-stat-num gv-blue" id="stat-curso">0</div><div class="gv-stat-lbl">En Curso</div></div>
<div class="gv-stat-card"><div class="gv-stat-num gv-green" id="stat-comp">0</div><div class="gv-stat-lbl">Completados</div></div>
<div class="gv-stat-card"><div class="gv-stat-num gv-red" id="stat-dem">0</div><div class="gv-stat-lbl">Demorados</div></div>
</div>
<div style="display:flex;gap:8px;margin-bottom:14px"><button class="gv-btn gv-btn-sec gv-btn-sm gv-view-btn gv-active" data-view="lista" id="gv-view-lista">Lista</button><button class="gv-btn gv-btn-sec gv-btn-sm gv-view-btn" data-view="calendario" id="gv-view-calendario">Calendario</button></div>
<div id="gv-calendar-wrap" style="display:none;margin-bottom:16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><button class="gv-btn gv-btn-sec gv-btn-sm" id="gv-cal-prev">&lsaquo; Anterior</button><h3 id="gv-cal-title" style="margin:0;color:#00AEEF;font-size:1rem"></h3><button class="gv-btn gv-btn-sec gv-btn-sm" id="gv-cal-next">Siguiente &rsaquo;</button></div><div id="gv-cal-grid" class="gv-cal-grid"></div></div>
<div id="gv-loading" style="text-align:center;padding:20px;color:#666;display:none">Cargando conductores y vehiculos...</div>
<div id="gv-list-filter-info" style="display:none"></div>
<div id="gv-trip-list"></div>
</div>

<div id="gv-tab-nuevo" class="gv-tab-content">
<div class="gv-form-card">
<h2>Nuevo Viaje</h2>
<div class="gv-form-row"><label>Conductor</label><select id="gv-conductor"><option value="">Seleccionar conductor...</option></select></div>
<div class="gv-form-row"><label>Unidad / Vehiculo</label><select id="gv-vehiculo"><option value="">Seleccionar vehiculo...</option></select></div>
<div class="gv-form-row gv-two-col">
<div><label>Fecha</label><input type="date" id="gv-fecha"></div>
<div><label>Hora de Salida</label><input type="time" id="gv-hora"></div>
</div>
<div class="gv-form-row">
<label>Origen<span class="gv-req">*</span></label>
<div class="gv-loc-display"><span id="gv-origen-txt">Sin seleccionar</span><button type="button" class="gv-btn gv-btn-sec gv-btn-sm" id="gv-btn-origen">Ubicar en Mapa</button></div>
</div>
<div class="gv-form-row">
<label>Puntos de Carga/Descarga</label>
<div id="gv-stops-list"></div>
<button type="button" class="gv-btn gv-btn-sec gv-btn-sm" id="gv-btn-add-stop">+ Agregar punto en el mapa</button>
</div>
<div class="gv-form-row">
<label>Destino<span class="gv-req">*</span></label>
<div class="gv-loc-display"><span id="gv-destino-txt">Sin seleccionar</span><button type="button" class="gv-btn gv-btn-sec gv-btn-sm" id="gv-btn-destino">Ubicar en Mapa</button></div>
</div>
<div class="gv-form-row"><label>Observaciones</label><textarea id="gv-obs" rows="3" placeholder="Instrucciones para el chofer..."></textarea></div>
<div style="display:flex;gap:12px;justify-content:flex-end;margin-top:20px">
<button id="gv-btn-cancelar" class="gv-btn gv-btn-sec">Cancelar</button>
<button id="gv-btn-guardar" class="gv-btn gv-btn-primary">Guardar Viaje</button>
</div>
<div id="gv-form-msg" style="margin-top:12px;padding:10px;border-radius:6px;display:none"></div>
</div>
</div>

<div id="gv-tab-seguimiento" class="gv-tab-content">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
<h2 style="margin:0;color:#00AEEF;font-size:1.1rem">Seguimiento en tiempo real</h2>
<button class="gv-btn gv-btn-sec gv-btn-sm" id="gv-btn-refresh-track">Actualizar</button>
</div>
<div id="gv-track-map" style="height:420px;border-radius:10px;border:1px solid #e5e7eb;margin-bottom:14px"></div>
<div id="gv-track-list"></div>
</div>

<div id="gv-tab-alertas" class="gv-tab-content">
<div id="gv-alertas-list"><p style="text-align:center;color:#6b7280;padding:40px">Sin alertas activas</p></div>
</div>
</div>
<script src="common.js"></script>
<script>
(function(){
'use strict';

var gState = { conductores: [], vehiculos: [], zonas: [] };
var gApi = null;
var gTrackMap = null;
var gTrackLayer = null;
var gTrackInterval = null;
var gTrackRenderGen = 0;
var gPanelView = 'lista';
var gCalMonth = new Date(); gCalMonth.setDate(1);
var gCalSelectedDay = null; var gVehicleState = {}; var gLiveStatusCache = {};

function showTab(name){
  document.querySelectorAll('.gv-tab-btn').forEach(function(b){
    b.classList.toggle('gv-active', b.getAttribute('data-tab') === name);
  });
  document.querySelectorAll('.gv-tab-content').forEach(function(c){
    c.classList.toggle('gv-show', c.id === 'gv-tab-' + name);
  });
  if(name === 'seguimiento'){ renderTracking(); if(!gTrackInterval){ gTrackInterval = setInterval(renderTracking, 15000); } } else { if(gTrackInterval){ clearInterval(gTrackInterval); gTrackInterval = null; } }
}

function renderStats(){
  var viajes = GV.Storage.getViajes();
  var hoy=0, curso=0, comp=0, dem=0;
  var today = new Date().toDateString();
  viajes.forEach(function(v){
    if(new Date(v.fechaSalida).toDateString() === today) hoy++;
    if(v.estado === 'en_curso') curso++;
    if(v.estado === 'completado') comp++;
    if(v.estado === 'demorado') dem++;
  });
  var vals = {'stat-hoy':hoy,'stat-curso':curso,'stat-comp':comp,'stat-dem':dem};
  Object.keys(vals).forEach(function(id){ var el=document.getElementById(id); if(el) el.textContent = vals[id]; });
}

function gerenciamientoBadge(v){
  var g = v.gerenciamiento;
  if(!g || !g.resultado) return '<span class="gv-status" style="background:#f3f4f6;color:#6b7280">Pendiente gerenciamiento</span>';
  if(g.resultado === 'verde') return '<span class="gv-status" style="background:#d1fae5;color:#065f46">Gerenciamiento verde</span>';
  if(g.resultado === 'rojo') return '<span class="gv-status" style="background:#fee2e2;color:#991b1b">Bloqueado (rojo)</span>';
  if(g.autorizadoPor === 'supervisor') return '<span class="gv-status" style="background:#d1fae5;color:#065f46">Autorizado por supervisor</span>';
  if(g.rechazado) return '<span class="gv-status" style="background:#fee2e2;color:#991b1b">Rechazado por supervisor</span>';
  return '<span class="gv-status" style="background:#fef3c7;color:#78350f">Esperando autorizacion</span>';
}

function puedeIniciar(v){
  var g = v.gerenciamiento;
  if(!g || !g.resultado) return false;
  if(g.resultado === 'rojo') return false;
  if(g.resultado === 'verde') return true;
  return g.autorizadoPor === 'supervisor';
}

function renderTrips(){
  var list = document.getElementById('gv-trip-list');
  if(!list) return;
  var viajes = GV.Storage.getViajes();
var filterInfo = document.getElementById('gv-list-filter-info');
if(gCalSelectedDay){
viajes = viajes.filter(function(v){ return GV.dateStr(v.fechaSalida) === gCalSelectedDay; });
if(filterInfo){
filterInfo.style.display = 'block';
filterInfo.innerHTML = '<span class="gv-filter-chip">Viajes del ' + gCalSelectedDay.split('-').reverse().join('/') + ' <button type="button" id="gv-clear-filter" style="border:none;background:none;color:#1e3a8a;cursor:pointer;font-weight:700">&times; Quitar filtro</button></span>';
var cf = document.getElementById('gv-clear-filter');
if(cf) cf.addEventListener('click', function(){ gCalSelectedDay = null; renderTrips(); });
}
} else if(filterInfo){ filterInfo.style.display = 'none'; filterInfo.innerHTML = ''; }

  if(!viajes.length){
    list.innerHTML = '<p style="text-align:center;color:#6b7280;padding:40px">No hay viajes registrados. Usa "Nuevo Viaje" para crear el primero.</p>';
    return;
  }
  var sorted = viajes.slice().sort(function(a,b){ return new Date(b.fechaSalida) - new Date(a.fechaSalida); });
  list.innerHTML = sorted.map(function(v){
    var origenTxt = v.origen ? v.origen.direccion : '';
    var destinoTxt = v.destino ? v.destino.direccion : '';
    var stops = (v.paradas || []).map(function(p){
      return '<span class="gv-stop-chip gv-' + p.tipo + '">' + GV.tipoParadaLabel(p.tipo) + ': ' + GV.escapeHtml(p.direccion) + ' (' + p.duracionMin + ' min)</span>';
    }).join('');
    stops = ((v.origen && v.origen.tipo) ? ('<span class="gv-stop-chip gv-' + v.origen.tipo + '">Origen - ' + GV.tipoParadaLabel(v.origen.tipo) + ' (' + (v.origen.duracionMin||0) + ' min)</span>') : '') + ((v.destino && v.destino.tipo) ? ('<span class="gv-stop-chip gv-' + v.destino.tipo + '">Destino - ' + GV.tipoParadaLabel(v.destino.tipo) + ' (' + (v.destino.duracionMin||0) + ' min)</span>') : '') + stops; var actions = '';
    if(v.estado === 'planificado'){
      actions = puedeIniciar(v)
        ? '<button class="gv-btn gv-btn-suc gv-btn-sm" data-action="iniciar" data-id="' + v.id + '">Iniciar</button><button class="gv-btn gv-btn-sec gv-btn-sm" data-action="cancelar" data-id="' + v.id + '">Cancelar</button>'
        : '<button class="gv-btn gv-btn-sec gv-btn-sm" data-action="cancelar" data-id="' + v.id + '">Cancelar</button>';
    } else if(v.estado === 'en_curso' || v.estado === 'demorado'){
      actions = '<button class="gv-btn gv-btn-primary gv-btn-sm" data-action="completar" data-id="' + v.id + '">Completar</button>';
    }
    actions += '<button class="gv-btn gv-btn-sec gv-btn-sm" data-action="detalle" data-id="' + v.id + '">Ver Detalle</button>';
    return '<div class="gv-trip-card">' +
      '<div class="gv-trip-header"><div class="gv-trip-title">' + GV.escapeHtml(v.conductor||'?') + ' - ' + GV.escapeHtml(v.vehiculo||'?') + '</div>' +
      '<div style="display:flex;gap:6px;flex-wrap:wrap"><span class="gv-status gv-s-' + (v.estado||'planificado') + '">' + GV.statusLabel(v.estado||'planificado') + '</span>' + gerenciamientoBadge(v) + '</div></div>' +
      '<div class="gv-trip-info">' + GV.fmtDate(v.fechaSalida) + ' &nbsp;|&nbsp; ' + GV.escapeHtml(origenTxt) + ' &rarr; ' + GV.escapeHtml(destinoTxt) + '</div>' + ((v.estado==='en_curso'||v.estado==='demorado') ? ('<div class="gv-live-banner gv-live-' + ((gLiveStatusCache[v.id]&&gLiveStatusCache[v.id].cls)||'unknown') + '">' + ((gLiveStatusCache[v.id]&&gLiveStatusCache[v.id].label)||'Obteniendo estado en vivo...') + '</div>') : '') +
      (stops ? '<div class="gv-stops">' + stops + '</div>' : '') +
      (v.observaciones ? '<div style="font-size:.82rem;color:#6b7280;margin-top:6px;font-style:italic">' + GV.escapeHtml(v.observaciones) + '</div>' : '') +
      '<div class="gv-trip-actions">' + actions + '</div></div>';
  }).join('');
}

function renderAlertas(){
  var list = document.getElementById('gv-alertas-list');
  var badge = document.getElementById('gv-alert-badge');
  if(!list) return;
  var alertas = GV.Storage.getAlertas();
  if(!alertas.length){
    list.innerHTML = '<p style="text-align:center;color:#6b7280;padding:40px">Sin alertas activas</p>';
    if(badge) badge.style.display = 'none';
    return;
  }
  if(badge){ badge.style.display = 'inline'; badge.textContent = alertas.length; }
  list.innerHTML = alertas.map(function(a){
    var isAuth = a.tipo === 'autorizacion';
    var extra = isAuth
      ? '<div style="display:flex;gap:8px"><button class="gv-btn gv-btn-suc gv-btn-sm" data-action="aprobar" data-id="' + a.id + '">Aprobar</button><button class="gv-btn gv-btn-danger gv-btn-sm" data-action="rechazar" data-id="' + a.id + '">Rechazar</button></div>'
      : '<button class="gv-btn gv-btn-sec gv-btn-sm" data-action="dismiss" data-id="' + a.id + '">Descartar</button>';
    return '<div class="gv-alert-card' + (isAuth ? ' gv-alert-warn' : '') + '"><div><div class="gv-alert-text">' + GV.escapeHtml(a.mensaje) + '</div><div class="gv-alert-time">' + GV.fmtDate(a.fecha) + '</div></div>' + extra + '</div>';
  }).join('');
}

function checkDelays(){
  var now = new Date(), DELAY = 30*60*1000;
  var changed = false;
  GV.Storage.getViajes().forEach(function(v){
    if(v.estado === 'planificado' && puedeIniciar(v) && (now - new Date(v.fechaSalida)) > DELAY){
      v.estado = 'demorado';
      changed = true;
      var aid = 'al_' + v.id + '_sal';
      GV.Storage.addAlerta({ id: aid, tipo: 'demora', mensaje: v.conductor + ' no salio a tiempo desde ' + (v.origen ? v.origen.direccion : ''), fecha: new Date().toISOString(), viajeId: v.id });
    }
  });
  if(changed){ GV.Storage.updateViaje(null, {}); }
}

function classifyVehicleStatus(deviceId, rec){ var now = Date.now(); var fixTime = rec && rec.dateTime ? new Date(rec.dateTime).getTime() : now; var commAge = now - fixTime; var speed = (rec && rec.speed) || 0; if(commAge > 10*60*1000){ return { cls:'nocomm', label:'Sin comunicacion hace ' + GV.fmtDurMin(commAge) }; } var st = gVehicleState[deviceId] || (gVehicleState[deviceId] = {}); if(speed > 3){ st.stoppedSince = null; return { cls:'moving', label:'Circulando a ' + Math.round(speed) + ' km/h' }; } if(!st.stoppedSince){ st.stoppedSince = now; } return { cls:'stopped', label:'Detenido hace ' + GV.fmtDurMin(now - st.stoppedSince) }; } function siteListFor(v){ var arr = []; if(v.origen && v.origen.tipo) arr.push({ id:'origen', label:'Origen (' + (v.origen.direccion||'') + ')', lat:v.origen.lat, lng:v.origen.lng, tipo:v.origen.tipo, dur:v.origen.duracionMin||0 }); (v.paradas||[]).forEach(function(p,i){ if(p.tipo) arr.push({ id:'parada'+i, label:'Parada '+(i+1)+' ('+(p.direccion||'')+')', lat:p.lat, lng:p.lng, tipo:p.tipo, dur:p.duracionMin||0 }); }); if(v.destino && v.destino.tipo) arr.push({ id:'destino', label:'Destino (' + (v.destino.direccion||'') + ')', lat:v.destino.lat, lng:v.destino.lng, tipo:v.destino.tipo, dur:v.destino.duracionMin||0 }); return arr; } function checkDwellAlerts(){ if(!gApi) return; var activos = GV.Storage.getViajes().filter(function(v){ return (v.estado === 'en_curso' || v.estado === 'demorado') && v.vehiculoId; }); activos.forEach(function(v){ gApi.call('Get', { typeName: 'DeviceStatusInfo', search: { deviceSearch: { id: v.vehiculoId } } }, function(res){ if(!res || !res.length || res[0].latitude == null) return; var r = res[0]; var __st = classifyVehicleStatus(v.vehiculoId, r); gLiveStatusCache[v.id] = __st; if(gPanelView === 'lista'){ renderTrips(); } var speed = r.speed || 0; var sites = siteListFor(v); if(!sites.length) return; var atSite = null; sites.forEach(function(s){ var d = GV.distKm({lat:r.latitude,lng:r.longitude},{lat:s.lat,lng:s.lng}); if(d != null && d*1000 <= GV.SITE_GEOFENCE_M){ atSite = s; } }); var dw = v.dwellState || null; if(atSite){ if(!dw || dw.siteId !== atSite.id){ var __sr = Object.assign({}, v.sitiosReal || {}); if(!__sr[atSite.id]) __sr[atSite.id] = {}; if(!__sr[atSite.id].ingreso) __sr[atSite.id].ingreso = new Date().toISOString(); GV.Storage.updateViaje(v.id, { dwellState: { siteId: atSite.id, arrivedAt: new Date().toISOString(), alertado: false }, sitiosReal: __sr }); } else if(dw && !dw.alertado){ var elapsedMin = (Date.now() - new Date(dw.arrivedAt).getTime())/60000; if(atSite.dur && elapsedMin > atSite.dur){ var aid = 'al_' + v.id + '_' + atSite.id + '_dwell'; GV.Storage.addAlerta({ id: aid, tipo:'demora_carga', mensaje: v.conductor + ' - ' + v.vehiculo + ': demora en ' + GV.tipoParadaLabel(atSite.tipo) + ' en ' + atSite.label + ' (lleva ' + Math.round(elapsedMin) + ' min, programado ' + atSite.dur + ' min)', fecha: new Date().toISOString(), viajeId: v.id }); GV.Storage.updateViaje(v.id, { dwellState: { siteId: atSite.id, arrivedAt: dw.arrivedAt, alertado: true } }); } } } else if(dw){ var __sr2 = Object.assign({}, v.sitiosReal || {}); if(!__sr2[dw.siteId]) __sr2[dw.siteId] = {}; __sr2[dw.siteId].egreso = new Date().toISOString(); GV.Storage.updateViaje(v.id, { dwellState: null, sitiosReal: __sr2 }); } }, function(){}); }); } function loadMasterData(api){
  var loading = document.getElementById('gv-loading');
  if(loading) loading.style.display = 'block';
  var done = 0;
  function onDone(){ done++; if(done >= 3 && loading) loading.style.display = 'none'; }

  api.call('Get', {typeName:'User', search:{isDriver:true}}, function(res){
    gState.conductores = (res||[]).map(function(u){ return {id:u.id, nombre:((u.firstName||'')+' '+(u.lastName||'')).trim(), name:u.name}; });
    var sel = document.getElementById('gv-conductor');
    if(sel && gState.conductores.length){
      sel.innerHTML = '<option value="">Seleccionar conductor...</option>' +
        gState.conductores.map(function(c){ return '<option value="' + c.id + '">' + GV.escapeHtml(c.nombre) + '</option>'; }).join('');
    }
    onDone();
  }, function(){ onDone(); });

  api.call('Get', {typeName:'Device', search:{}}, function(res){
    gState.vehiculos = (res||[]).map(function(d){ return {id:d.id, nombre:d.name||d.id}; });
    var sel = document.getElementById('gv-vehiculo');
    if(sel && gState.vehiculos.length){
      sel.innerHTML = '<option value="">Seleccionar vehiculo...</option>' +
        gState.vehiculos.map(function(d){ return '<option value="' + d.id + '">' + GV.escapeHtml(d.nombre) + '</option>'; }).join('');
    }
    onDone();
  }, function(){ onDone(); });

  api.call('Get', {typeName:'Zone', search:{}}, function(res){
    gState.zonas = res || [];
    onDone();
  }, function(){ onDone(); });
}

var gOrigen = null, gDestino = null, gParadas = [];

function renderStopsList(){
  var sl = document.getElementById('gv-stops-list');
  if(!sl) return;
  sl.innerHTML = gParadas.map(function(p, idx){
    return '<div class="gv-stop-item">' +
      '<span class="gv-stop-badge gv-' + p.tipo + '">' + GV.tipoParadaLabel(p.tipo) + '</span>' +
      '<span>' + GV.escapeHtml(p.direccion) + ' (' + p.duracionMin + ' min)</span>' +
      '<button type="button" class="gv-stop-remove" data-idx="' + idx + '">&times;</button></div>';
  }).join('');
  sl.querySelectorAll('.gv-stop-remove').forEach(function(btn){
    btn.addEventListener('click', function(){
      gParadas.splice(parseInt(btn.getAttribute('data-idx'),10), 1);
      renderStopsList();
    });
  });
}

function resetForm(){
  gOrigen = null; gDestino = null; gParadas = [];
  document.getElementById('gv-origen-txt').textContent = 'Sin seleccionar';
  document.getElementById('gv-destino-txt').textContent = 'Sin seleccionar';
  renderStopsList();
  var cSel=document.getElementById('gv-conductor'), vSel=document.getElementById('gv-vehiculo');
  var oEl=document.getElementById('gv-obs');
  if(cSel) cSel.value=''; if(vSel) vSel.value=''; if(oEl) oEl.value='';
  var now = new Date();
  var fEl=document.getElementById('gv-fecha'), hEl=document.getElementById('gv-hora');
  if(fEl) fEl.value = now.toISOString().substring(0,10);
  if(hEl) hEl.value = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
}

function setupEvents(){
  if (window.__gvEventsBound) { return; }
  window.__gvEventsBound = true;
  document.querySelectorAll('.gv-tab-btn').forEach(function(btn){
    btn.addEventListener('click', function(){ showTab(btn.getAttribute('data-tab')); });
  });

document.querySelectorAll('.gv-view-btn').forEach(function(btn){
btn.addEventListener('click', function(){ switchPanelView(btn.getAttribute('data-view')); });
});
var calPrevBtn = document.getElementById('gv-cal-prev');
if(calPrevBtn) calPrevBtn.addEventListener('click', function(){ gCalMonth.setMonth(gCalMonth.getMonth()-1); renderCalendar(); });
var calNextBtn = document.getElementById('gv-cal-next');
if(calNextBtn) calNextBtn.addEventListener('click', function(){ gCalMonth.setMonth(gCalMonth.getMonth()+1); renderCalendar(); });

  document.getElementById('gv-btn-origen').addEventListener('click', function(){
    GV.pickLocation({ title: 'Punto de origen', initial: gOrigen, withStopFields: false }).then(function(res){
      if(res){ gOrigen = res; document.getElementById('gv-origen-txt').textContent = res.direccion + (res.tipo ? ' - ' + GV.tipoParadaLabel(res.tipo) + ' (' + res.duracionMin + ' min)' : ''); }
    });
  });

  document.getElementById('gv-btn-destino').addEventListener('click', function(){
    GV.pickLocation({ title: 'Punto de destino', initial: gDestino, withStopFields: false }).then(function(res){

function renderTracking(){
  var box = document.getElementById('gv-track-map');
  var listEl = document.getElementById('gv-track-list');
  if(!box) return;
  GV.loadLeaflet().then(function(L){
    if(!gTrackMap){
      gTrackMap = L.map('gv-track-map').setView([-38.951, -68.059], 9);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '&copy; OpenStreetMap contributors' }).addTo(gTrackMap);
      gTrackLayer = L.layerGroup().addTo(gTrackMap);
    }
    gTrackLayer.clearLayers();
    gTrackRenderGen++;
    var myGen = gTrackRenderGen;
    setTimeout(function(){ try{ gTrackMap.invalidateSize(); }catch(e){} }, 100);

    var activos = GV.Storage.getViajes().filter(function(v){ return v.estado === 'en_curso' || v.estado === 'demorado' || v.estado === 'planificado'; });
    if(!activos.length){
      if(listEl) listEl.innerHTML = '<p style="text-align:center;color:#6b7280;padding:20px">No hay viajes activos para mostrar.</p>';
      return;
    }

    var bounds = [];
    activos.forEach(function(v){
      var pts = [];
      if(v.origen) pts.push([v.origen.lat, v.origen.lng]);
      (v.paradas||[]).forEach(function(p){ pts.push([p.lat, p.lng]); });
      if(v.destino) pts.push([v.destino.lat, v.destino.lng]);
      if(pts.length > 1){
              var __fallbackLine = L.polyline(pts, { color: '#00AEEF', weight: 3, opacity: .5, dashArray: '6,6' }).addTo(gTrackLayer);
              (function(fallbackLine, gen){
                GV.getRoute(pts.map(function(p){ return { lat: p[0], lng: p[1] }; })).then(function(route){
                  if(gen !== gTrackRenderGen) return;
                  if(route && route.coords && route.coords.length > 1){
                    if(gTrackLayer.hasLayer(fallbackLine)){ gTrackLayer.removeLayer(fallbackLine); }
                    L.polyline(route.coords, { color: '#00AEEF', weight: 4, opacity: .8 }).addTo(gTrackLayer);
                  }
                });
              })(__fallbackLine, myGen);
            }
      pts.forEach(function(p){ bounds.push(p); });
      if(v.origen) L.circleMarker([v.origen.lat, v.origen.lng], {radius:6, color:'#059669', fillColor:'#059669', fillOpacity:1}).bindTooltip('Origen: ' + v.origen.direccion).addTo(gTrackLayer); if(v.origen && v.origen.tipo) L.circle([v.origen.lat, v.origen.lng], {radius:GV.SITE_GEOFENCE_M, color:'#2563eb', weight:1, fillColor:'#2563eb', fillOpacity:.12}).addTo(gTrackLayer);
      if(v.destino) L.circleMarker([v.destino.lat, v.destino.lng], {radius:6, color:'#dc2626', fillColor:'#dc2626', fillOpacity:1}).bindTooltip('Destino: ' + v.destino.direccion).addTo(gTrackLayer); if(v.destino && v.destino.tipo) L.circle([v.destino.lat, v.destino.lng], {radius:GV.SITE_GEOFENCE_M, color:'#2563eb', weight:1, fillColor:'#2563eb', fillOpacity:.12}).addTo(gTrackLayer);
      (v.paradas||[]).forEach(function(p){
        L.circleMarker([p.lat, p.lng], {radius:5, color:'#d97706', fillColor:'#d97706', fillOpacity:1}).bindTooltip(GV.tipoParadaLabel(p.tipo) + ': ' + p.direccion).addTo(gTrackLayer); if(p.tipo) L.circle([p.lat, p.lng], {radius:GV.SITE_GEOFENCE_M, color:'#2563eb', weight:1, fillColor:'#2563eb', fillOpacity:.12}).addTo(gTrackLayer);
      });
    });

    if(listEl){
      listEl.innerHTML = activos.map(function(v){
        return '<div class="gv-trip-card"><div class="gv-trip-title">' + GV.escapeHtml(v.conductor) + ' - ' + GV.escapeHtml(v.vehiculo) + '</div>' +
          '<div class="gv-trip-info">' + GV.statusLabel(v.estado) + ' &nbsp;|&nbsp; ' + GV.escapeHtml(v.origen?v.origen.direccion:'') + ' &rarr; ' + GV.escapeHtml(v.destino?v.destino.direccion:'') + '</div>' + '<div id="gv-track-status-' + v.id + '" class="gv-live-banner gv-live-unknown">Obteniendo estado...</div></div>';
      }).join('');
    }

    if(!gApi){ if(bounds.length) gTrackMap.fitBounds(bounds, {padding:[30,30]}); return; }

    var pending = activos.length;
    if(!pending){ if(bounds.length) gTrackMap.fitBounds(bounds, {padding:[30,30]}); return; }
    activos.forEach(function(v){
      gApi.call('Get', { typeName: 'DeviceStatusInfo', search: { deviceSearch: { id: v.vehiculoId } } }, function(res){
        if(res && res.length && res[0].latitude){
          var pos = [res[0].latitude, res[0].longitude];
          bounds.push(pos);
          var __ts = classifyVehicleStatus(v.vehiculoId, res[0]); var __tsEl = document.getElementById('gv-track-status-' + v.id); if(__tsEl){ __tsEl.className = 'gv-live-banner gv-live-' + __ts.cls; __tsEl.textContent = __ts.label; } L.marker(pos, { icon: L.divIcon({ className: 'gv-vehicle-marker', html: '<div class="gv-live-marker-lbl">&#128667;</div>', iconSize: [28,28], iconAnchor: [14,14] }), zIndexOffset: 1000 }).bindTooltip(v.conductor + ' - ' + v.vehiculo + ' (' + __ts.label + ')').addTo(gTrackLayer);
        }
        pending--;
        if(pending <= 0 && bounds.length){ gTrackMap.fitBounds(bounds, {padding:[30,30]}); }
      }, function(){ pending--; if(pending <= 0 && bounds.length){ gTrackMap.fitBounds(bounds, {padding:[30,30]}); } });
    });
  }).catch(function(err){ if(box) box.textContent = 'Error al cargar el mapa: ' + err.message; });
}

function renderCalendar(){
var grid = document.getElementById('gv-cal-grid');

if(!grid) return;
var year = gCalMonth.getFullYear(), month = gCalMonth.getMonth();
var monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
if(title) title.textContent = monthNames[month] + ' ' + year;
var viajes = GV.Storage.getViajes();
var firstDow = (new Date(year, month, 1).getDay() + 6) % 7;
var daysInMonth = new Date(year, month+1, 0).getDate();
var todayStr = GV.dateStr(new Date());
var dows = ['Lun','Mar','Mie','Jue','Vie','Sab','Dom'];
var html = dows.map(function(d){ return '<div class="gv-cal-dow">' + d + '</div>'; }).join('');
var i;
for(i=0;i<firstDow;i++){ html += '<div class="gv-cal-day gv-cal-empty"></div>'; }
for(var day=1; day<=daysInMonth; day++){

var dateStr = GV.dateStr(dateObj);
var dayTrips = viajes.filter(function(v){ return GV.dateStr(v.fechaSalida) === dateStr; });
var cls = 'gv-cal-day';

var curso = dayTrips.filter(function(v){ return v.estado === 'en_curso' || v.estado === 'demorado'; }).length;

html += '<div class="' + cls + '" data-date="' + dateStr + '">' +
'<div class="gv-cal-daynum">' + day + '</div>' +
(dayTrips.length ? '<div class="gv-cal-count">' + dayTrips.length + '</div>' : '') +
(dayTrips.length ? '<div class="gv-cal-sub">' + plan + ' plan / ' + curso + ' curso / ' + comp + ' comp</div>' : '') +
'</div>';

grid.innerHTML = html;
grid.querySelectorAll('.gv-cal-day[data-date]').forEach(function(cell){
cell.addEventListener('click', function(){
gCalSelectedDay = cell.getAttribute('data-date');
switchPanelView('lista');

}

function loadHist(){
var to = new Date();
var from = chk.checked ? new Date(to.getTime() - 4*3600*1000) : new Date(v.fechaSalida);
GV.getHistory(gApi, v.vehiculoId, from.toISOString(), to.toISOString()).then(function(recs){
detHistPts = recs;
detHistLayer.clearLayers();
if(recs.length){
var line = recs.map(function(r){ return [r.latitude, r.longitude]; });
L.polyline(line, { color: '#0077A3', weight: 3, opacity: .6 }).addTo(detHistLayer);
slider.max = recs.length - 1;
slider.value = recs.length - 1;
slider.disabled = false;
updateHistMarker(recs.length - 1);
} else {
slider.disabled = true;
}
});
}
chk.addEventListener('change', loadHist);
slider.addEventListener('input', function(){ updateHistMarker(parseInt(slider.value, 10)); });
loadHist();
}
}).catch(function(err){ var itinEl2 = document.getElementById('gv-det-itin'); if(itinEl2) itinEl2.textContent = 'Error al cargar el mapa: ' + err.message; });
}

function doInit(api){
  window._gvInitDone = true;
  gApi = api;
  GV.injectCSS('gv-style-container');
  setupEvents();

  GV.Storage.init(api).then(function(){
    checkDelays(); checkDwellAlerts();
    renderStats(); renderTrips(); renderAlertas();
    GV.Storage.onChange(function(){ renderStats(); renderAlertas(); if(gPanelView === 'calendario'){ renderCalendar(); } else { renderTrips(); } });
  });

  var now = new Date();
  var fe = document.getElementById('gv-fecha'), he = document.getElementById('gv-hora');
  if(fe) fe.value = now.toISOString().substring(0,10);
  if(he) he.value = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

  if(api){
    loadMasterData(api);
    setInterval(function(){
      checkDelays(); checkDwellAlerts();
      GV.Storage.refresh().then(function(){ renderStats(); renderAlertas(); if(gPanelView === 'calendario'){ renderCalendar(); } else { renderTrips(); } });
    }, 60000);
  } else {
    var loading = document.getElementById('gv-loading');
    if(loading){ loading.style.display = 'block'; loading.textContent = 'Cargando listas... (si persiste, recarga la pagina)'; }
    var directApi = GV.makeDirectApi();
    directApi.call('GetVersion', {}, function(){ loadMasterData(directApi); }, function(){ if(loading) loading.style.display = 'none'; });
  }
}

window.initialize = function(api, state, callback){
  doInit(api);
  if(typeof callback === 'function') callback();
};

if(typeof geotab !== 'undefined' && geotab.addin){
  geotab.addin.GestionViajesDP = function(){
    return {
      initialize: function(api, state, callback){ doInit(api); if(typeof callback === 'function') callback(); },
      focus: function(){}, blur: function(){}
    };
  };
}

setTimeout(function(){
  if(typeof window._gvInitDone === 'undefined'){
    window._gvInitDone = true;
    doInit(null);
  }
}, 800);

var _origInit = window.initialize;
window.initialize = function(api, state, callback){
  window._gvInitDone = true;
  return _origInit.apply(this, arguments);
};

})();
</script>
