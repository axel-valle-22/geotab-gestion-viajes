<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gestión de Viajes</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e}#app{max-width:1200px;margin:0 auto;padding:16px}.header{background:linear-gradient(135deg,#0066cc,#004499);color:#fff;padding:20px 24px;border-radius:12px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}.header h1{font-size:22px;font-weight:700}.header .subtitle{font-size:13px;opacity:.8;margin-top:4px}.badge{background:rgba(255,255,255,.2);padding:6px 14px;border-radius:20px;font-size:13px}.tabs{display:flex;gap:8px;margin-bottom:20px}.tab-btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}.tab-btn.active{background:#0066cc;color:#fff}.tab-btn:not(.active){background:#fff;color:#666;border:1px solid #ddd}.tab-btn:not(.active):hover{background:#f0f2f5}.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}.card-title{font-size:16px;font-weight:700;margin-bottom:16px;color:#1a1a2e;border-bottom:2px solid #0066cc;padding-bottom:8px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.form-group{display:flex;flex-direction:column;gap:6px}.form-group label{font-size:13px;font-weight:600;color:#555}.form-group select,.form-group input{padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;transition:border .2s}.form-group select:focus,.form-group input:focus{outline:none;border-color:#0066cc}.stops-container{margin-top:16px}.stop-item{display:flex;align-items:center;gap:10px;padding:10px;background:#f8f9fa;border-radius:8px;margin-bottom:8px;border-left:4px solid #0066cc}.stop-item.carga{border-left-color:#28a745}.stop-item.descarga{border-left-color:#dc3545}.stop-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}.stop-info{flex:1}.stop-name{font-weight:600;font-size:14px}.stop-type{font-size:12px;color:#888}.stop-time{font-size:12px;color:#666;margin-top:2px}.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}.btn-primary{background:#0066cc;color:#fff}.btn-primary:hover{background:#0052a3}.btn-success{background:#28a745;color:#fff}.btn-danger{background:#dc3545;color:#fff}.btn-sm{padding:6px 12px;font-size:12px}.btn:disabled{opacity:.5;cursor:not-allowed}.add-stop-row{display:flex;gap:8px;align-items:flex-end}.add-stop-row .form-group{flex:1}.trips-grid{display:grid;gap:12px}.trip-card{border:1.5px solid #e0e0e0;border-radius:10px;overflow:hidden}.trip-card-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between}.trip-card-header.pendiente{background:#fff3cd}.trip-card-header.en_curso{background:#d1ecf1}.trip-card-header.completado{background:#d4edda}.trip-card-header.demorado{background:#f8d7da}.status-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700}.status-badge.pendiente{background:#ffc107;color:#856404}.status-badge.en_curso{background:#17a2b8;color:#fff}.status-badge.completado{background:#28a745;color:#fff}.status-badge.demorado{background:#dc3545;color:#fff}.trip-card-body{padding:12px 16px;background:#fff}.trip-route{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13px}.trip-route span{color:#888}.trip-meta{display:flex;gap:16px;font-size:12px;color:#666}.trip-meta strong{color:#333}.trip-stops{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}.stop-chip{padding:3px 10px;background:#f0f2f5;border-radius:12px;font-size:11px;color:#555}.stop-chip.ok{background:#d4edda;color:#155724}.stop-chip.pending{background:#fff3cd;color:#856404}.stop-chip.current{background:#cce5ff;color:#004085}.actions-row{display:flex;gap:8px;margin-top:12px}.alert{padding:10px 14px;border-radius:8px;margin-bottom:8px;display:flex;align-items:center;gap:8px;font-size:13px}.alert-warning{background:#fff3cd;border:1px solid #ffc107;color:#856404}.alert-danger{background:#f8d7da;border:1px solid #dc3545;color:#721c24}.alert-icon{font-size:18px}.loading{text-align:center;padding:40px;color:#888;font-size:15px}.empty-state{text-align:center;padding:40px;color:#aaa}.empty-state .icon{font-size:48px;margin-bottom:12px}.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999;display:none}.modal-overlay.open{display:flex}.modal{background:#fff;border-radius:16px;padding:24px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto}.modal-title{font-size:18px;font-weight:700;margin-bottom:20px}.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}.full-width{grid-column:1/-1}@media(max-width:600px){.form-grid{grid-template-columns:1fr}.header{flex-direction:column;gap:12px;text-align:center}}</style></head><body><div id="app"><div class="header"><div><h1>&#128667; Gesti&#243;n de Viajes</h1><div class="subtitle">DoloresParra S.A. &#8212; Panel de Coordinaci&#243;n</div></div><div class="badge" id="userBadge">Cargando...</div></div><div class="tabs"><button class="tab-btn active" onclick="showTab('panel')" id="tab-panel">&#128202; Panel</button><button class="tab-btn" onclick="showTab('nuevo')" id="tab-nuevo">&#10133; Nuevo Viaje</button><button class="tab-btn" onclick="showTab('alertas')" id="tab-alertas">&#128276; Alertas <span id="alertCount" style="background:#dc3545;color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;display:none">0</span></button></div><div id="content-panel"></div><div id="content-nuevo" style="display:none"></div><div id="content-alertas" style="display:none"></div></div><div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div><script>var api,state={drivers:[],devices:[],zones:[],trips:[],alerts:[],currentUser:null};function init(freshApi,s){api=freshApi;loadData();}function loadData(){Promise.all([api.call('Get',{typeName:'Driver',search:{isDriver:true}}),api.call('Get',{typeName:'Device',search:{fromDate:'2000-01-01'}}),api.call('Get',{typeName:'Zone',search:{zoneTypeSearch:{}}})]).then(function(res){state.drivers=res[0]||[];state.devices=res[1]||[];state.zones=res[2]||[];return loadStoredTrips();}).then(function(){document.getElementById('userBadge').textContent='Coordinador';renderPanel();}).catch(function(e){console.error(e);state.drivers=[];state.devices=[];state.zones=[];renderPanel();});}function loadStoredTrips(){return api.call('Get',{typeName:'AddInData',search:{addInId:'gestion-viajes-dp'}}).then(function(res){if(res&&res.length>0){try{var d=JSON.parse(res[0].details||'{}');state.trips=d.trips||[];state.alerts=d.alerts||[];}catch(e){state.trips=[];state.alerts=[];}}return res;}).catch(function(){state.trips=[];state.alerts=[];return[];});}function saveTrips(){var data={trips:state.trips,alerts:state.alerts,updated:new Date().toISOString()};return api.call('Get',{typeName:'AddInData',search:{addInId:'gestion-viajes-dp'}}).then(function(res){if(res&&res.length>0){return api.call('Set',{typeName:'AddInData',entity:{id:res[0].id,addInId:'gestion-viajes-dp',details:JSON.stringify(data)}});}else{return api.call('Add',{typeName:'AddInData',entity:{addInId:'gestion-viajes-dp',details:JSON.stringify(data)}});}}).catch(function(e){console.error('Save error:',e);});}function showTab(t){['panel','nuevo','alertas'].forEach(function(x){document.getElementById('content-'+x).style.display=x===t?'block':'none';document.getElementById('tab-'+x).classList.toggle('active',x===t);});if(t==='panel')renderPanel();if(t==='nuevo')renderNuevo();if(t==='alertas')renderAlertas();}function getStatusLabel(s){return{pendiente:'Pendiente',en_curso:'En Curso',completado:'Completado',demorado:'Demorado'}[s]||s;}function renderPanel(){var el=document.getElementById('content-panel');checkAlerts();var alertsActive=state.alerts.filter(function(a){return!a.dismissed;});var alertHtml=alertsActive.slice(0,3).map(function(a){return'<div class="alert alert-'+(a.type==='danger'?'danger':'warning')+'"><span class="alert-icon">'+(a.type==='danger'?'&#128680;':'&#9888;&#65039;')+'</span>'+a.message+'</div>';}).join('');var today=new Date().toDateString();var todayTrips=state.trips.filter(function(t){return new Date(t.fechaSalida).toDateString()===today;});var stats=['<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">','<div class="card" style="text-align:center;padding:16px"><div style="font-size:28px;font-weight:700;color:#0066cc">'+todayTrips.length+'</div><div style="font-size:13px;color:#888;margin-top:4px">Viajes Hoy</div></div>','<div class="card" style="text-align:center;padding:16px"><div style="font-size:28px;font-weight:700;color:#17a2b8">'+todayTrips.filter(function(t){return t.status==='en_curso';}).length+'</div><div style="font-size:13px;color:#888;margin-top:4px">En Curso</div></div>','<div class="card" style="text-align:center;padding:16px"><div style="font-size:28px;font-weight:700;color:#28a745">'+todayTrips.filter(function(t){return t.status==='completado';}).length+'</div><div style="font-size:13px;color:#888;margin-top:4px">Completados</div></div>','<div class="card" style="text-align:center;padding:16px"><div style="font-size:28px;font-weight:700;color:#dc3545">'+todayTrips.filter(function(t){return t.status==='demorado';}).length+'</div><div style="font-size:13px;color:#888;margin-top:4px">Demorados</div></div>','</div>'].join('');var tripsHtml=state.trips.length===0?'<div class="empty-state"><div class="icon">&#128203;</div><div>No hay viajes registrados</div><div style="font-size:13px;margin-top:8px">Us&#225; el bot&#243;n "Nuevo Viaje" para crear uno</div></div>':state.trips.slice().sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt);}).map(function(trip){var stopsHtml=trip.stops.map(function(s,i){var cls=s.completado?'ok':(trip.status==='en_curso'&&i===trip.currentStop?'current':'pending');return'<span class="stop-chip '+cls+'">'+(s.type==='carga'?'&#128230;':'&#128228;')+' '+s.nombre+'</span>';}).join('');var delay=getDelayMinutes(trip);return'<div class="trip-card"><div class="trip-card-header '+trip.status+'"><div><div style="font-weight:700;font-size:15px">'+trip.vehiculo+' &#8212; '+trip.conductor+'</div><div style="font-size:12px;opacity:.8">'+formatDate(trip.fechaSalida)+' '+trip.horaSalida+'</div></div><span class="status-badge '+trip.status+'">'+getStatusLabel(trip.status)+'</span></div><div class="trip-card-body"><div class="trip-route">&#128205; <strong>'+trip.origen+'</strong> <span>&#8594;</span> &#127937; <strong>'+trip.destino+'</strong></div><div class="trip-stops">'+stopsHtml+'</div><div class="trip-meta" style="margin-top:8px"><span><strong>ETA:</strong> '+trip.horaLlegada+'</span><span><strong>Paradas:</strong> '+trip.stops.length+'</span>'+(delay>0?'<span style="color:#dc3545">&#8987; '+delay+'min demora</span>':'')+'</div><div class="actions-row">'+(trip.status==='pendiente'?'<button class="btn btn-success btn-sm" onclick="iniciarViaje(''+trip.id+'')">&#9654; Iniciar</button>':'')+(trip.status==='en_curso'?'<button class="btn btn-primary btn-sm" onclick="avanzarParada(''+trip.id+'')">&#10003; Confirmar Parada</button>':'')+(trip.status!=='completado'?'<button class="btn btn-danger btn-sm" onclick="deleteTrip(''+trip.id+'')">&#128465;</button>':'')+'<button class="btn btn-sm" style="background:#f0f2f5" onclick="verDetalle(''+trip.id+'')">&#128065; Ver</button></div></div></div>';}).join('');el.innerHTML=alertHtml+stats+'<div class="card"><div class="card-title">&#128203; Todos los Viajes</div><div class="trips-grid">'+tripsHtml+'</div></div>';var ac=document.getElementById('alertCount');if(alertsActive.length>0){ac.style.display='inline';ac.textContent=alertsActive.length;}else{ac.style.display='none';}}function getDelayMinutes(trip){if(trip.status!=='en_curso'&&trip.status!=='demorado')return 0;var now=new Date();var expected=new Date(trip.fechaSalida+'T'+trip.horaSalida);return Math.max(0,Math.floor((now-expected)/60000)-30);}function checkAlerts(){var now=new Date();state.trips.forEach(function(trip){if(trip.status==='pendiente'){var expected=new Date(trip.fechaSalida+'T'+trip.horaSalida);var diff=Math.floor((now-expected)/60000);if(diff>30&&!state.alerts.find(function(a){return a.tripId===trip.id&&a.subtype==='salida';})){state.alerts.push({id:'a'+Date.now(),tripId:trip.id,type:'warning',subtype:'salida',message:'&#9888; '+trip.conductor+' ('+trip.vehiculo+') no sali&#243;. Demora: '+diff+' min',dismissed:false,createdAt:now.toISOString()});trip.status='demorado';}}if(trip.status==='en_curso'&&trip.currentStop<trip.stops.length){var stop=trip.stops[trip.currentStop];if(!stop.arrivedAt)stop.arrivedAt=now.toISOString();var stopTime=Math.floor((now-new Date(stop.arrivedAt))/60000);if(stopTime>(stop.tiempoEstimado||60)+30&&!state.alerts.find(function(a){return a.tripId===trip.id&&a.subtype==='parada'+trip.currentStop;})){state.alerts.push({id:'a'+Date.now(),tripId:trip.id,type:'danger',subtype:'parada'+trip.currentStop,message:'&#128680; '+trip.conductor+' lleva '+stopTime+'min en '+stop.nombre+' (estimado: '+stop.tiempoEstimado+'min)',dismissed:false,createdAt:now.toISOString()});}}});}function formatDate(d){var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}function iniciarViaje(id){var trip=state.trips.find(function(t){return t.id===id;});if(trip){trip.status='en_curso';trip.currentStop=0;trip.startedAt=new Date().toISOString();saveTrips().then(function(){renderPanel();});}}function avanzarParada(id){var trip=state.trips.find(function(t){return t.id===id;});if(!trip)return;if(trip.currentStop<trip.stops.length){trip.stops[trip.currentStop].completado=true;trip.stops[trip.currentStop].completadoAt=new Date().toISOString();trip.currentStop++;}if(trip.currentStop>=trip.stops.length){trip.status='completado';trip.completedAt=new Date().toISOString();}saveTrips().then(function(){renderPanel();});}function deleteTrip(id){if(confirm('&#191;Eliminar este viaje?')){state.trips=state.trips.filter(function(t){return t.id!==id;});saveTrips().then(function(){renderPanel();});}}function verDetalle(id){var trip=state.trips.find(function(t){return t.id===id;});if(!trip)return;document.getElementById('modalContent').innerHTML='<div class="modal-title">&#128203; '+trip.vehiculo+' &#8212; '+trip.conductor+'</div><div><strong>Estado:</strong> <span class="status-badge '+trip.status+'">'+getStatusLabel(trip.status)+'</span></div><br><div><strong>Fecha:</strong> '+formatDate(trip.fechaSalida)+'</div><div><strong>Salida:</strong> '+trip.horaSalida+' | <strong>ETA:</strong> '+trip.horaLlegada+'</div><br><div><strong>Origen:</strong> &#128205; '+trip.origen+'</div><div style="margin:12px 0">'+trip.stops.map(function(s){return'<div class="stop-item '+s.type+'"><div class="stop-dot">'+(s.completado?'&#9989;':(s.type==='carga'?'&#128230;':'&#128228;'))+'</div><div class="stop-info"><div class="stop-name">'+s.nombre+'</div><div class="stop-type">'+s.type+(s.completadoAt?' &#8212; '+new Date(s.completadoAt).toLocaleTimeString('es-AR'):'')+'</div></div></div>';}).join('')+'</div><div><strong>Destino:</strong> &#127937; '+trip.destino+'</div>'+(trip.observaciones?'<br><div><strong>Obs:</strong> '+trip.observaciones+'</div>':'')+'<div class="modal-actions"><button class="btn btn-primary" onclick="closeModal()">Cerrar</button></div>';document.getElementById('modalOverlay').classList.add('open');}function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}function renderNuevo(){window._newStops=[];var el=document.getElementById('content-nuevo');var dOpts=(state.drivers||[]).map(function(d){return'<option value="'+d.id+'">'+d.firstName+' '+d.lastName+'</option>';}).join('');var vOpts=(state.devices||[]).map(function(d){return'<option value="'+d.id+'">'+d.name+'</option>';}).join('');var zOpts=(state.zones||[]).map(function(z){return'<option value="'+z.id+'">'+z.name+'</option>';}).join('');var today=new Date().toISOString().split('T')[0];el.innerHTML='<div class="card"><div class="card-title">&#10133; Crear Nuevo Viaje</div><div class="form-grid"><div class="form-group"><label>&#128100; Conductor</label><select id="nv-conductor"><option value="">Seleccionar...</option>'+dOpts+'</select></div><div class="form-group"><label>&#128667; Unidad</label><select id="nv-vehiculo"><option value="">Seleccionar...</option>'+vOpts+'</select></div><div class="form-group"><label>&#128197; Fecha</label><input type="date" id="nv-fecha" value="'+today+'"></div><div class="form-group"><label>&#9200; Hora Salida</label><input type="time" id="nv-hora-salida" value="08:00"></div><div class="form-group"><label>&#127937; Hora Llegada Est.</label><input type="time" id="nv-hora-llegada" value="18:00"></div><div class="form-group"><label>&#128205; Origen</label><input type="text" id="nv-origen" placeholder="Ej: Base Allen..."></div><div class="form-group full-width"><label>&#127937; Destino Final</label><input type="text" id="nv-destino" placeholder="Ej: Base Plottier..."></div><div class="form-group full-width"><label>&#128221; Observaciones</label><input type="text" id="nv-obs" placeholder="Tipo de carga, instrucciones..."></div></div><div class="stops-container"><div style="font-weight:700;margin-bottom:12px">&#128230; Puntos de Carga / Descarga</div><div id="stops-list"><div style="color:#aaa;font-size:13px;padding:8px">Sin paradas agregadas</div></div><div class="add-stop-row"><div class="form-group"><label>Tipo</label><select id="stop-type"><option value="carga">&#128230; Carga</option><option value="descarga">&#128228; Descarga</option></select></div><div class="form-group" style="flex:3"><label>Zona Geotab</label><select id="stop-zone"><option value="">Seleccionar zona...</option>'+zOpts+'</select></div><div class="form-group"><label>Min estimados</label><input type="number" id="stop-tiempo" value="60" style="width:80px"></div><div class="form-group"><label>&nbsp;</label><button class="btn btn-primary" onclick="addStop()">+ Agregar</button></div></div></div><div style="margin-top:20px;display:flex;gap:8px;justify-content:flex-end"><button class="btn" style="background:#f0f2f5" onclick="showTab('panel')">Cancelar</button><button class="btn btn-success" onclick="guardarViaje()">&#128190; Crear Viaje</button></div></div>';}function addStop(){var type=document.getElementById('stop-type').value;var sel=document.getElementById('stop-zone');var zoneId=sel.value;var zoneName=sel.options[sel.selectedIndex].text;var tiempo=parseInt(document.getElementById('stop-tiempo').value)||60;if(!zoneId){alert('Seleccioná una zona');return;}window._newStops=window._newStops||[];window._newStops.push({id:'s'+Date.now(),type:type,zoneId:zoneId,nombre:zoneName,tiempoEstimado:tiempo,completado:false});var html=window._newStops.map(function(s,i){return'<div class="stop-item '+s.type+'"><div class="stop-dot">'+(s.type==='carga'?'&#128230;':'&#128228;')+'</div><div class="stop-info"><div class="stop-name">'+s.nombre+'</div><div class="stop-type">'+s.type+' &#8212; '+s.tiempoEstimado+' min</div></div><button class="btn btn-danger btn-sm" onclick="window._newStops.splice('+i+',1);addStop.refresh()">&#10005;</button></div>';}).join('');document.getElementById('stops-list').innerHTML=html||'<div style="color:#aaa;font-size:13px">Sin paradas</div>';}function guardarViaje(){var cs=document.getElementById('nv-conductor');var vs=document.getElementById('nv-vehiculo');if(!cs.value||!vs.value){alert('Completá todos los campos');return;}var trip={id:'trip'+Date.now(),conductorId:cs.value,conductor:cs.options[cs.selectedIndex].text,vehiculoId:vs.value,vehiculo:vs.options[vs.selectedIndex].text,fechaSalida:document.getElementById('nv-fecha').value,horaSalida:document.getElementById('nv-hora-salida').value,horaLlegada:document.getElementById('nv-hora-llegada').value,origen:document.getElementById('nv-origen').value,destino:document.getElementById('nv-destino').value,observaciones:document.getElementById('nv-obs').value,stops:window._newStops||[],status:'pendiente',currentStop:0,createdAt:new Date().toISOString()};if(!trip.origen||!trip.destino){alert('Completá origen y destino');return;}state.trips.push(trip);saveTrips().then(function(){window._newStops=[];alert('&#9989; Viaje creado exitosamente');showTab('panel');}).catch(function(e){alert('Error: '+e.message);});}function renderAlertas(){var el=document.getElementById('content-alertas');var active=state.alerts.filter(function(a){return!a.dismissed;});el.innerHTML='<div class="card"><div class="card-title">&#128276; Alertas Activas ('+active.length+')</div>'+(active.length===0?'<div class="empty-state"><div class="icon">&#9989;</div><div>Sin alertas activas</div></div>':active.map(function(a){return'<div class="alert alert-'+(a.type||'warning')+'" style="justify-content:space-between"><div style="display:flex;gap:8px;align-items:center"><span class="alert-icon">&#9888;&#65039;</span>'+a.message+'</div><button class="btn btn-sm" style="background:rgba(0,0,0,.1)" onclick="dismissAlert(''+a.id+'')">&#10003; OK</button></div>';}).join(''))+'</div>';}function dismissAlert(id){var a=state.alerts.find(function(x){return x.id===id;});if(a)a.dismissed=true;saveTrips().then(function(){renderAlertas();});}document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});setInterval(function(){if(state.trips.length>0){checkAlerts();renderPanel();}},60000);</script></body></html>
